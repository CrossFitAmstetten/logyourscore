<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Your Score — CrossFit Amstetten</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0f0f0f;--s:#1a1a1a;--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.15);--a:#e8c840;--a2:#c9a820;--t:#f0ede8;--m:#888880;--d:#e85540;--ok:#4caf7d;--r:10px;--fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:var(--fb);font-size:15px;line-height:1.6;min-height:100vh;}
.sc{display:none;flex-direction:column;min-height:100vh;}.sc.on{display:flex;}
nav{background:var(--s);border-bottom:1px solid var(--b);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:2px;color:var(--a);}
.nu{display:flex;align-items:center;gap:10px;}
.av{width:34px;height:34px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#000;flex-shrink:0;}
.nn{font-size:13px;color:var(--m);}
.blo{background:none;border:1px solid var(--b2);color:var(--m);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--fb);}
.blo:hover{border-color:var(--a);color:var(--a);}
.aw{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.ac{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:2.25rem 2rem;width:100%;max-width:410px;}
.at{font-family:var(--fd);font-size:40px;letter-spacing:3px;color:var(--a);margin-bottom:.2rem;}
.as{color:var(--m);font-size:13px;margin-bottom:1.5rem;}
.tr{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg);border-radius:8px;padding:4px;}
.tb{flex:1;padding:7px;background:none;border:none;color:var(--m);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;}
.tb.on{background:var(--a);color:#000;}
label{display:block;font-size:11px;font-weight:500;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;margin-top:.9rem;}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--b2);color:var(--t);padding:10px 13px;border-radius:7px;font-family:var(--fb);font-size:14px;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--a);}
select option{background:#1a1a1a;}
textarea{resize:vertical;min-height:70px;}
.bp{width:100%;margin-top:1.25rem;background:var(--a);color:#000;border:none;padding:12px;border-radius:8px;font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;}
.bp:hover{background:var(--a2);}
.msg{margin-top:.75rem;font-size:12px;text-align:center;padding:7px;border-radius:6px;}
.msg.err{background:rgba(232,85,64,.15);color:var(--d);}
.msg.ok{background:rgba(76,175,125,.15);color:var(--ok);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc{flex:1;max-width:920px;width:100%;margin:0 auto;padding:1.75rem 1.5rem;}
.dn{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--s);border-radius:10px;padding:5px;}
.dt{flex:1;background:none;border:none;color:var(--m);font-family:var(--fb);font-size:13px;font-weight:500;padding:9px 4px;cursor:pointer;border-radius:7px;}
.dt.on{background:var(--a);color:#000;}
.vi{display:none;}.vi.on{display:block;}
.st{font-family:var(--fd);font-size:28px;letter-spacing:2px;color:var(--a);margin-bottom:1.25rem;}
.wl{display:grid;gap:9px;}
.wc{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:.95rem 1.15rem;cursor:pointer;transition:border-color .15s;}
.wc:hover{border-color:var(--a);}
.wt{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.wn{font-family:var(--fd);font-size:20px;letter-spacing:1px;}
.wb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.bo{background:rgba(232,200,64,.15);color:var(--a);border:1px solid rgba(232,200,64,.3);}
.bd{background:rgba(255,255,255,.06);color:var(--m);}
.wca{font-size:10px;color:var(--m);margin-top:2px;}
.wd{font-size:12px;color:var(--m);margin-top:5px;line-height:1.5;}
.wp{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;}
.pl{color:var(--m);}.pv{font-weight:600;color:var(--a);}.pd{color:var(--m);font-size:11px;}
.sw{position:relative;margin-bottom:1rem;}
.sw input{padding-left:38px;}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--m);pointer-events:none;width:16px;height:16px;}
.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.fb{background:none;border:1px solid var(--b);color:var(--m);padding:5px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--fb);}
.fb:hover{border-color:var(--b2);color:var(--t);}
.fb.on{background:var(--a);color:#000;border-color:var(--a);}
.yf{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;padding:10px 12px;background:rgba(232,200,64,.06);border:1px solid rgba(232,200,64,.2);border-radius:8px;}
.yb{background:none;border:1px solid rgba(232,200,64,.25);color:var(--m);padding:4px 10px;border-radius:14px;cursor:pointer;font-size:11px;font-family:var(--fb);}
.yb:hover{border-color:var(--a);color:var(--a);}
.yb.on{background:var(--a);color:#000;border-color:var(--a);}
.yl{font-size:11px;color:var(--a);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;margin-right:4px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;}
.overlay.on{display:flex;}
.mo{background:var(--s);border:1px solid var(--b2);border-radius:14px;padding:1.75rem;width:100%;max-width:480px;margin-top:1rem;}
.mt{font-family:var(--fd);font-size:26px;letter-spacing:2px;color:var(--a);margin-bottom:.3rem;}
.ms{font-size:12px;color:var(--m);margin-bottom:1.25rem;line-height:1.5;}
.ms2{font-size:11px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin:1rem 0 .6rem;}
.sl{display:flex;flex-direction:column;gap:7px;}
.sr{background:var(--bg);border:1px solid var(--b);border-radius:7px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;}
.sv{font-weight:600;font-size:14px;}.si2{font-size:11px;color:var(--m);}
.bc{background:none;border:none;color:var(--m);cursor:pointer;font-size:20px;line-height:1;padding:2px;}
.bs{background:none;border:1px solid var(--b2);color:var(--m);padding:5px 10px;border-radius:5px;font-family:var(--fb);font-size:12px;cursor:pointer;}
.bs.bsd{border-color:rgba(232,85,64,.4);color:var(--d);}
.ph{display:flex;align-items:center;gap:1.1rem;margin-bottom:1.5rem;}
.pa{width:60px;height:60px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#000;flex-shrink:0;}
.pn{font-family:var(--fd);font-size:32px;letter-spacing:2px;}
.ps{font-size:12px;color:var(--m);}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:1.5rem;}
.sk{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:.9rem;text-align:center;}
.sv2{font-family:var(--fd);font-size:30px;color:var(--a);}
.sl2{font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;}
.em{text-align:center;padding:2.5rem 1rem;color:var(--m);font-size:13px;}
.fc{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:1.35rem;margin-bottom:1.25rem;}
@media(max-width:640px){.mc{padding:1rem 1rem 1rem;}.dn{position:fixed;bottom:0;left:0;right:0;border-radius:0;border-top:1px solid var(--b);padding:6px 8px 10px;z-index:100;}.mc{padding-bottom:80px;}.dt{font-size:11px;}.nn{display:none;}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="sc on" id="sa">
  <div class="aw">
    <div class="ac">
      <div class="at">BOX DB</div>
      <div class="as">CrossFit Amstetten — WOD Score Tracker</div>
      <div class="tr">
        <button class="tb on" onclick="sat('login')">Anmelden</button>
        <button class="tb" onclick="sat('reg')">Registrieren</button>
      </div>
      <div id="alog">
        <label>E-Mail</label><input type="email" id="le" placeholder="deine@email.com" autocomplete="email"/>
        <label>Passwort</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"/>
        <button class="bp" onclick="dol()">Einloggen</button>
      </div>
      <div id="areg" style="display:none">
        <div class="r2">
          <div><label>Vorname</label><input type="text" id="rf" placeholder="Max"/></div>
          <div><label>Nachname</label><input type="text" id="rl" placeholder="Mustermann"/></div>
        </div>
        <label>E-Mail</label><input type="email" id="re" placeholder="deine@email.com"/>
        <label>Passwort</label><input type="password" id="rp" placeholder="Mind. 6 Zeichen"/>
        <label>Box / Gym (optional)</label><input type="text" id="rb" placeholder="CrossFit Amstetten"/>
        <button class="bp" onclick="dor()">Konto erstellen</button>
      </div>
      <div id="am"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="sc" id="sapp">
  <nav>
    <div class="logo">BOX DB</div>
    <div class="nu">
      <div class="av" id="navav"></div>
      <span class="nn" id="navnm">–</span>
      <button class="blo" onclick="dout()">Logout</button>
    </div>
  </nav>
  <div class="mc">
    <div class="dn">
      <button class="dt on" data-v="bm" onclick="sv('bm')">📊 Benchmarks</button>
      <button class="dt" data-v="cw" onclick="sv('cw')">⏱ Eigene</button>
      <button class="dt" data-v="add" onclick="sv('add')">➕ Anlegen</button>
      <button class="dt" data-v="pr" onclick="sv('pr')">👤 Profil</button>
    </div>

    <!-- BENCHMARKS -->
    <div class="vi on" id="vbm">
      <div class="st">Benchmark WODs</div>
      <div class="sw">
        <svg class="si" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="bsq" placeholder="WOD suchen…" oninput="rb()"/>
      </div>
      <div class="fr" id="bfr"></div>
      <div id="yfw" style="display:none"><div class="yf" id="yf"></div></div>
      <div class="wl" id="bl"></div>
    </div>

    <!-- EIGENE -->
    <div class="vi" id="vcw">
      <div class="st">Eigene Workouts</div>
      <div class="wl" id="cl"></div>
    </div>

    <!-- ANLEGEN -->
    <div class="vi" id="vadd">
      <div class="st">Workout anlegen</div>
      <div class="fc">
        <label>Name</label><input type="text" id="wna" placeholder="z.B. Friday Fran…"/>
        <label>Typ</label>
        <select id="wty"><option>For Time</option><option>AMRAP</option><option>EMOM</option><option>Max Load</option><option>Max Reps</option><option>Sonstige</option></select>
        <label>Beschreibung</label>
        <textarea id="wde" placeholder="21-15-9&#10;Thrusters&#10;Pull-ups"></textarea>
        <label>Score-Einheit</label>
        <select id="wun"><option>Zeit (mm:ss)</option><option>Runden + Reps</option><option>kg</option><option>Wiederholungen</option><option>Punkte</option></select>
        <button class="bp" onclick="scw()">Workout speichern</button>
        <div id="addm"></div>
      </div>
    </div>

    <!-- PROFIL -->
    <div class="vi" id="vpr">
      <div class="ph">
        <div class="pa" id="pav"></div>
        <div>
          <div class="pn" id="pnm">–</div>
          <div class="ps" id="psi"></div>
        </div>
      </div>
      <div class="sg" id="pst"></div>
      <div class="st" style="font-size:22px;margin-bottom:.75rem;">Letzte Scores</div>
      <div id="prec"></div>
    </div>
  </div>

  <!-- SCORE MODAL -->
  <div class="overlay" id="sov" onclick="csm(event)">
    <div class="mo">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;">
        <div><div class="mt" id="mwn">–</div><div class="ms" id="mwd">–</div></div>
        <button class="bc" onclick="csm(null,true)">✕</button>
      </div>
      <div class="ms2">Neuen Score eintragen</div>
      <div class="r2">
        <div><label id="scl">Score</label><input type="text" id="svi"/></div>
        <div><label>Datum</label><input type="date" id="sdi"/></div>
      </div>
      <label>Notizen (optional)</label>
      <input type="text" id="sni" placeholder="z.B. RX, scaled, PR…"/>
      <button class="bp" onclick="ss()">Score speichern</button>
      <div id="smsg"></div>
      <div class="ms2">Meine Scores</div>
      <div class="sl" id="msl"></div>
    </div>
  </div>
</div>

  // OPEN 2025
  {id:'o251',name:'25.1',type:'AMRAP',cat:'Open',year:'2025',desc:'15 min AMRAP (Reps +3/Runde):\n3 Lateral Burpees over DB\n3 DB Hang Clean-to-OH\n30 ft (2x15) Walking Lunge\n♀ 15 kg · ♂ 22.5 kg',unit:'Runden + Reps'},
  {id:'o252',name:'25.2',type:'For Time',cat:'Open',year:'2025',desc:'For Time:\n21 Pull-ups · 42 DU · 21 Thrusters (Gew.1)\n18 C2B · 36 DU · 18 Thrusters (Gew.2)\n15 BMU · 30 DU · 15 Thrusters (Gew.3)\n♀ 20/25/29 kg · ♂ 29/38/47 kg',unit:'Zeit (mm:ss)'},
  {id:'o253',name:'25.3',type:'For Time',cat:'Open',year:'2025',desc:'For Time (Cap 20 min)\n5 Wall Walks · 50 Cal Row\n5 Wall Walks · 25 Deadlifts\n5 Wall Walks · 25 Cleans\n5 Wall Walks · 25 Snatches\n5 Wall Walks · 50 Cal Row\n♀ DL 70/Cl 38/Sn 29 kg · ♂ DL 102/Cl 61/Sn 43 kg',unit:'Zeit (mm:ss)'},
  // OPEN 2026
  {id:'o261',name:'26.1',type:'For Time',cat:'Open',year:'2026',desc:'For Time (Cap 12 min) — Pyramide:\n20 WBS · 18 Box Jump-Overs\n30 WBS · 18 Box Jump-Overs\n40 WBS · 18 MB Box Step-Overs\n66 WBS · 18 MB Box Step-Overs\n40 WBS · 18 Box Jump-Overs\n30 WBS · 18 Box Jump-Overs · 20 WBS\n♀ 6 kg/50 cm · ♂ 9 kg/60 cm',unit:'Zeit (mm:ss)'},
  {id:'o262',name:'26.2',type:'For Time',cat:'Open',year:'2026',desc:'For Time (Cap 15 min) — 3 Rounds:\nRd1: 80ft DB OH Lunge + 20 DB Snatches + 20 Pull-ups\nRd2: 80ft DB OH Lunge + 20 DB Snatches + 20 C2B\nRd3: 80ft DB OH Lunge + 20 DB Snatches + 20 Ring MU\n♀ 16 kg · ♂ 22.5 kg',unit:'Zeit (mm:ss)'},
  {id:'o263',name:'26.3',type:'For Time',cat:'Open',year:'2026',desc:'For Time (Cap 16 min) — 6 Rounds:\nRds 1-2: 12 Burpees over Bar + 12 Cleans + 12 Thrusters\nRds 3-4: gleich, schwerer\nRds 5-6: gleich, am schwersten\n♀ 29/34/38 kg · ♂ 43/52/61 kg',unit:'Zeit (mm:ss)'},
];

const CATS=['Alle','Girl','Hero','Benchmark','Strength','Open'];
const YRS=['Alle','2024','2025','2026'];

function ldb(){
  try{DB=JSON.parse(localStorage.getItem(SK))||{users:{},scores:{}};}
  catch(e){DB={users:{},scores:{}};}
  DB.users=DB.users||{};DB.scores=DB.scores||{};
}
function sdb(){localStorage.setItem(SK,JSON.stringify(DB));}

// Testuser beim ersten Laden anlegen
function initTestUser(){
  if(!DB.users['max@box.at']){
    DB.users['max@box.at']={
      email:'max@box.at',first:'Max',last:'Mustermann',
      box:'CrossFit Amstetten',pw:'test123',since:'2024-09-01'
    };
    DB.scores['max@box.at']={
      fran:[{val:'4:32',date:'2025-03-15',note:'RX',ts:Date.now()-100000},{val:'5:01',date:'2024-11-02',note:'RX',ts:Date.now()-200000}],
      annie:[{val:'7:44',date:'2025-01-10',note:'RX',ts:Date.now()-220000}],
      murph:[{val:'42:17',date:'2025-05-28',note:'mit Weste',ts:Date.now()-50000}],
      bs:[{val:'120',date:'2025-04-10',note:'PR!',ts:Date.now()-80000}],
      bp:[{val:'95',date:'2025-01-18',note:'PR',ts:Date.now()-180000}],
      fs:[{val:'100',date:'2025-03-01',note:'',ts:Date.now()-160000}],
      cl:[{val:'85',date:'2025-02-10',note:'PR',ts:Date.now()-170000}],
      o261:[{val:'11:02',date:'2026-02-28',note:'RX',ts:Date.now()-60000}],
      o263:[{val:'192',date:'2026-03-14',note:'RX',ts:Date.now()-20000}],
    };
    sdb();
  }
}

function sat(t){
  document.getElementById('alog').style.display=t==='login'?'':'none';
  document.getElementById('areg').style.display=t==='reg'?'':'none';
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',(i===0)===(t==='login')));
}
function sm(id,tx,tp){const e=document.getElementById(id);e.className='msg '+tp;e.textContent=tx;}

function dor(){
  const f=document.getElementById('rf').value.trim(),l=document.getElementById('rl').value.trim();
  const e=document.getElementById('re').value.trim().toLowerCase(),p=document.getElementById('rp').value;
  const bx=document.getElementById('rb').value.trim();
  if(!f||!l||!e||!p)return sm('am','Bitte alle Pflichtfelder ausfüllen.','err');
  if(p.length<6)return sm('am','Passwort mind. 6 Zeichen.','err');
  if(DB.users[e])return sm('am','E-Mail bereits registriert.','err');
  DB.users[e]={email:e,first:f,last:l,box:bx,pw:p,since:new Date().toISOString().split('T')[0]};
  sdb();sm('am','Konto erstellt! Jetzt einloggen.','ok');sat('login');
}
function dol(){
  const e=document.getElementById('le').value.trim().toLowerCase(),p=document.getElementById('lp').value;
  if(!DB.users[e]||DB.users[e].pw!==p)return sm('am','E-Mail oder Passwort falsch.','err');
  CU=DB.users[e];ea();
}
function dout(){CU=null;document.getElementById('sapp').classList.remove('on');document.getElementById('sa').classList.add('on');}

function ea(){
  document.getElementById('sa').classList.remove('on');
  document.getElementById('sapp').classList.add('on');
  const ini=(CU.first[0]+CU.last[0]).toUpperCase();
  document.getElementById('navav').textContent=ini;
  document.getElementById('pav').textContent=ini;
  document.getElementById('navnm').textContent=CU.first+' '+CU.last;
  document.getElementById('pnm').textContent=CU.first+' '+CU.last;
  document.getElementById('psi').textContent='Mitglied seit '+CU.since+(CU.box?' · '+CU.box:'');
  sv('bm');
}

function sv(v){
  document.querySelectorAll('.vi').forEach(e=>e.classList.toggle('on',e.id==='v'+v));
  document.querySelectorAll('[data-v]').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  if(v==='cw')rcw();if(v==='pr')rpr();if(v==='bm')rb();
}

function scat(c){AC=c;if(c!=='Open')AY='Alle';rb();}
function syr(y){AY=y;rb();}

function rb(){
  const q=(document.getElementById('bsq').value||'').toLowerCase();
  document.getElementById('bfr').innerHTML=CATS.map(c=>
    `<button class="fb${AC===c?' on':''}" onclick="scat('${c}')">${c}</button>`).join('');
  const yw=document.getElementById('yfw');
  if(AC==='Open'){
    yw.style.display='';
    document.getElementById('yf').innerHTML=`<span class="yl">Jahr:</span>`+
      YRS.map(y=>`<button class="yb${AY===y?' on':''}" onclick="syr('${y}')">${y}</button>`).join('');
  } else yw.style.display='none';
  const fil=WODs.filter(w=>{
    if(AC!=='Alle'&&w.cat!==AC)return false;
    if(AC==='Open'&&AY!=='Alle'&&w.year!==AY)return false;
    if(q&&!w.name.toLowerCase().includes(q)&&!w.desc.toLowerCase().includes(q))return false;
    return true;
  });
  const list=document.getElementById('bl');
  if(!fil.length){list.innerHTML='<div class="em">Keine Workouts gefunden.</div>';return;}
  list.innerHTML=fil.map(w=>{
    const pr=gbs(w.id);
    const io=w.cat==='Open';
    return`<div class="wc" onclick="osm('${w.id}','b')">
      <div class="wt"><div><div class="wn">${w.name}</div><div class="wca">${w.cat}${!io?' · '+w.type:''}</div></div>
      <span class="wb ${io?'bo':'bd'}">${io?'Open '+w.year:w.type}</span></div>
      <div class="wd">${w.desc.replace(/\n/g,'<br>')}</div>
      ${pr?`<div class="wp"><span class="pl">Beste:</span><span class="pv">${pr.v}</span><span class="pd">&nbsp;${pr.d}</span></div>`:''}
    </div>`;
  }).join('');
}

function gcw(){if(!DB.scores[CU.email])return[];return DB.scores[CU.email]._cw||[];}
function scw(){
  const n=document.getElementById('wna').value.trim().toUpperCase();
  const ty=document.getElementById('wty').value,de=document.getElementById('wde').value.trim();
  const un=document.getElementById('wun').value;
  if(!n||!de)return sm('addm','Name und Beschreibung sind Pflicht.','err');
  if(!DB.scores[CU.email])DB.scores[CU.email]={};
  if(!DB.scores[CU.email]._cw)DB.scores[CU.email]._cw=[];
  DB.scores[CU.email]._cw.push({id:'c_'+Date.now(),name:n,type:ty,desc:de,unit:un,cat:'Eigene'});
  sdb();sm('addm','Workout gespeichert!','ok');
  document.getElementById('wna').value='';document.getElementById('wde').value='';
}
function rcw(){
  const wods=gcw();const list=document.getElementById('cl');
  if(!wods.length){list.innerHTML='<div class="em">Noch keine eigenen Workouts.<br>Leg eines unter "Anlegen" an.</div>';return;}
  list.innerHTML=wods.map(w=>{const pr=gbs(w.id);return`<div class="wc" onclick="osm('${w.id}','c')"><div class="wt"><div class="wn">${w.name}</div><span class="wb bd">${w.type}</span></div><div class="wd">${w.desc.replace(/\n/g,'<br>')}</div>${pr?`<div class="wp"><span class="pl">Beste:</span><span class="pv">${pr.v}</span><span class="pd">&nbsp;${pr.d}</span></div>`:''}</div>`;}).join('');
}

function gus(id){if(!DB.scores[CU.email])return[];return DB.scores[CU.email][id]||[];}
function gbs(id){const s=gus(id);return s.length?{v:s[0].val,d:s[0].date}:null;}

function osm(id,src){
  const w=src==='b'?WODs.find(x=>x.id===id):gcw().find(x=>x.id===id);
  if(!w)return;CW=w;
  document.getElementById('mwn').textContent=w.name;
  document.getElementById('mwd').innerHTML=w.desc.replace(/\n/g,'<br>')+`<br><span style="color:var(--a);font-size:11px;font-weight:600;">${w.type} · ${w.unit}${w.year?' · Open '+w.year:''}</span>`;
  document.getElementById('scl').textContent=w.unit;
  document.getElementById('svi').placeholder=w.unit==='Zeit (mm:ss)'?'12:34':w.unit==='kg'?'100':w.unit==='Runden + Reps'?'8+12':'–';
  document.getElementById('sdi').value=new Date().toISOString().split('T')[0];
  document.getElementById('svi').value='';document.getElementById('sni').value='';
  document.getElementById('smsg').textContent='';
  rsl();document.getElementById('sov').classList.add('on');
}
function csm(e,f){if(f||(e&&e.target===document.getElementById('sov'))){document.getElementById('sov').classList.remove('on');CW=null;rb();rcw();}}
function ss(){
  const v=document.getElementById('svi').value.trim(),d=document.getElementById('sdi').value,n=document.getElementById('sni').value.trim();
  if(!v)return sm('smsg','Bitte Score eingeben.','err');
  if(!d)return sm('smsg','Bitte Datum wählen.','err');
  if(!DB.scores[CU.email])DB.scores[CU.email]={};
  if(!DB.scores[CU.email][CW.id])DB.scores[CU.email][CW.id]=[];
  DB.scores[CU.email][CW.id].unshift({val:v,date:d,note:n,ts:Date.now()});
  sdb();sm('smsg','Score gespeichert!','ok');
  document.getElementById('svi').value='';document.getElementById('sni').value='';
  rsl();rpr();
}
function ds(id,i){if(!confirm('Score löschen?'))return;DB.scores[CU.email][id].splice(i,1);sdb();rsl();rpr();}
function rsl(){
  const sc=gus(CW.id);const el=document.getElementById('msl');
  if(!sc.length){el.innerHTML='<div style="color:var(--m);font-size:12px;padding:6px 0;">Noch kein Score eingetragen.</div>';return;}
  el.innerHTML=sc.map((s,i)=>`<div class="sr"><div><div class="sv">${s.val}</div><div class="si2">${s.date}${s.note?' · '+s.note:''}</div></div><button class="bs bsd" onclick="ds('${CW.id}',${i})">Löschen</button></div>`).join('');
}
function rpr(){
  if(!CU)return;
  const us=DB.scores[CU.email]||{};
  let tot=0,done=0;const rec=[];
  Object.entries(us).forEach(([k,v])=>{if(k==='_cw')return;if(Array.isArray(v)&&v.length){done++;tot+=v.length;v.forEach(s=>rec.push({wid:k,...s}));}});
  rec.sort((a,b)=>b.ts-a.ts);
  const cc=(us._cw||[]).length;
  document.getElementById('pst').innerHTML=`<div class="sk"><div class="sv2">${tot}</div><div class="sl2">Scores</div></div><div class="sk"><div class="sv2">${done}</div><div class="sl2">WODs</div></div><div class="sk"><div class="sv2">${cc}</div><div class="sl2">Eigene</div></div>`;
  const re=document.getElementById('prec');
  if(!rec.length){re.innerHTML='<div class="em">Noch keine Scores eingetragen.</div>';return;}
  re.innerHTML=rec.slice(0,12).map(s=>{
    const w=WODs.find(x=>x.id===s.wid)||(gcw().find(x=>x.id===s.wid));
    const nm=w?w.name:s.wid;
    return`<div class="sr" style="margin-bottom:7px;"><div><div style="font-weight:600;font-size:13px;">${nm}</div><div class="si2">${s.date}${s.note?' · '+s.note:''}</div></div><div class="sv">${s.val}</div></div>`;
  }).join('');
}

// START
ldb();
initTestUser();
</script>
</body>
</html>
